<head>

<title>Atakaya PC Demo</title>
<style>
  body { 
    background: url('images/windows.png') no-repeat center center fixed; 
    background-size: cover;
    font-family: 'Segoe UI', 'Pyidaungsu', sans-serif;
    display: flex; flex-direction: column; align-items: center; 
    height: 100vh; margin: 0; overflow: hidden;
  }
  #notepad-container {
    width: 85%; max-width: 950px; margin-top: 60px;
    background: #fff; box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    border-radius: 5px; overflow: hidden;
  }
  .title-bar {
    background: #4a86e8; color: white; padding: 8px 15px;
    font-size: 14px; display: flex; justify-content: space-between;
  }
  
  #editor { 
    height: 380px; padding: 25px; font-size: 38px; border: none; outline: none;
    white-space: pre-wrap; overflow-y: auto; box-sizing: border-box;
    position: relative;
  }
  #editor::after {
    content: "|";
    display: inline-block;
    color: #000;
    width: 2px;
    margin-left: 2px;
    animation: blink 1s step-end infinite;
    font-weight: 100;
  }
  @keyframes blink {
    from, to { color: transparent; }
    50% { color: black; }
  }

  /* ── 미니 내비 ── */
  #step-nav {
    position: fixed;
    display: none;
    flex-direction: row;
    gap: 8px;
    z-index: 9000;
    pointer-events: none;
  }
  #step-nav.visible { display: flex; }
  .snav-group {
    display: flex;
    flex-direction: row;
    border: 1px solid #bbb;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    overflow: hidden;
  }
  .snav-cell {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Pyidaungsu', 'Myanmar Text', sans-serif;
    font-size: 20px;
    background: #f3f3f3;
    box-sizing: border-box;
    border-right: 1px solid #ddd;
  }
  .snav-cell:last-child { border-right: none; }
  .snav-cell.active { background: #ddeeff; }

.baby-guide-container {
  margin-top: 40px; 
  display: flex; 
  align-items: center; 
  justify-content: center;
  background: none;       
  padding: 0;             
  backdrop-filter: none;  
  border: none;           
  position: relative;     
}
.keyboard-pc { 
  transform: scale(0.48); 
  transform-origin: center;
  display: flex; 
  flex-direction: column; 
  gap: 8px;
  width: 850px; /* 간격 확보를 위해 가로폭 살짝 조정 */
  margin-left: -200px; 
  margin-top: -70px;
  align-self: flex-start; 
}
  .kb-row { display: flex; gap: 8px; width: 100%; }
  #row2 { padding-left: 35px; } 
  #row3 { padding-left: 75px; } 

  .key { 
    width: 65px; height: 65px; background: #fff; border-radius: 8px;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    font-size: 24px; font-weight: 800; box-shadow: 0 4px 0 #888;
    color: #333; position: relative;
  }

  /* 파란색 구역 스타일 */
  .key.blue-zone { 
    background-color: #e0f2fe !important; 
    border: 1px solid #bae6fd;
  }

  /* 중앙 간격을 위한 투명한 칸 */
  .spacer {
    width: 40px; 
    height: 65px;
  }

  .key.multi { 
    font-size: 28px !important; font-weight: 900; color: #000;
    white-space: nowrap; 
    letter-spacing: -1px;
  }
  .key.active { transform: translateY(4px); box-shadow: none; background: #eef2ff !important; }
  .key.plus-active { background: #fca5a5 !important; border: 2px solid #ef4444; }
  .key.vowel-plus { background-color: #f3e8ff !important; color: #7e22ce; }
  .key.special-plus { background-color: #f0fdf4 !important; color: #166534; }
  .key.subtle { font-size: 16px; color: #9ca3af; }
  .key.func { font-size: 22px; color: #4b5563; }

.baby-label {
  color: white; 
  font-size: 18px; 
  font-weight: bold;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.8); 
  position: absolute; 
  right: 45px;  
  top: 58%;       
  transform: translateY(-50%);
  white-space: nowrap;
}
</style>
</head>

</button>

<button onclick="goToBoard()"
        style="position: fixed; top: 20px; right: 438px;
               padding: 10px 18px; font-size: 1.1em;
               background-color: #16a34a; color: #fff;

               box-shadow: 0 2px 6px rgba(0,0,0,0.15);
               z-index: 9999;">
  💬 သုံးသပ်ချက် တင်ရန်
</button>
<div id="step-nav"></div>

<div id="notepad-container">
  <div class="title-bar"><span>Note</span><span>✕</span></div>
  <div id="editor" contenteditable="false"></div>
</div>

<div class="baby-guide-container">
  <div class="keyboard-pc" id="kbd">
    <div class="kb-row" id="row1"></div>
    <div class="kb-row" id="row2"></div>
    <div class="kb-row" id="row3"></div>
  </div>
  <button onclick="location.href='challenge.html'"
          style="position:absolute; right:-100px; top:-10%;
                 padding:12px 20px; font-size:1em;
                 background:#f59e0b; color:#fff;
                 border:none; border-radius:8px; cursor:pointer;
                 box-shadow:0 2px 6px rgba(0,0,0,0.25);
                 font-family:'Pyidaungsu','Segoe UI',sans-serif;
                 white-space:nowrap;">
    🏆 ကီးမပ်မပါဘဲ စိန်ခေါ်ကြည့်မည်!
  </button>
  <div class="baby-label">ATAKAYA ဘေးဘီး 1.0</div>
</div>

<script>
const getText = () => editor.innerText;
const setText = t => { editor.innerText = t; };
const stepMapRow = {
    "q": ["ဋ", "ဌ", "ဍ", "ဎ", "ဏ"], "a": ["အ", "ဟ", "ဠ"], "s": ["တ", "ထ", "ဒ", "ဓ"],
    "d": ["က", "ခ", "ဂ", "ဃ"], "f": ["ယ", "ရ", "လ", "ဝ"], "x": ["စ", "ဆ", "ဇ", "ဈ"],
    "c": ["ပ", "ဖ", "ဗ", "ဘ"]
};
const nasalKeys = { "w": "န", "e": "င", "r": "သ", "z": "ည", "v": "မ" }; // v키 복구됨
const multiTapMap = {
    "i": ["ိ", "ီ", "ဲ"], "j": ["ေ"], "k": ["်", "ံ"], "l": ["ာ", "ါ"],
    ";": ["း", "့"], "m": ["ှ", "ွ"], ",": ["ု", "ူ"], ".": ["ြ", "ျ"]
};
const plusVowels = { "u": "ဤ", "i": "ဣ", "j": "ဧ", "k": "ဩ", "l": "ဪ", "m": "ဦ", ",": "ဥ" };
const plusSpecials = { "t": "ဉ", "g": "၍", "b": "ဿ", "y": "၌", "h": "၎", "n": "၏" };

const row1 = ["q", "w", "e", "r", "t", "y", "u", "i", "o", "p"];
const row2 = ["a", "s", "d", "f", "g", "h", "j", "k", "l", ";"];
const row3 = ["z", "x", "c", "v", "b", "n", "m", ",", "."];

// 2,3,4열 및 7,8,9열 파란색 처리용
const blueZoneKeys = ["w", "e", "r", "s", "d", "f", "x", "c", "v", "u", "i", "o", "j", "k", "l", "m", ",", "."];

let state = {
    activeBase: null, currentIndex: 0,
    uIndex: 0, oIndex: 0,
    lastTapKey: null, tapIndex: 0,
    isPlusMode: false,
    pendingE: false,
    pendingStep: false,
    pendingStepE: false
};
const editor = document.getElementById('editor');

function renderKey(key) {
    const k = key.toLowerCase();
    const div = document.createElement('div');
    div.className = 'key';
    if (blueZoneKeys.includes(k)) div.classList.add('blue-zone');
    div.id = `key-${k}`;
    return div;
}

function initKbd() {
    [row1, row2, row3].forEach((r, i) => {
        const rowEl = document.getElementById(`row${i+1}`);
        r.forEach((k, idx) => {
            rowEl.appendChild(renderKey(k));
            // 5번째 키 다음에 간격 추가
            if (idx === 4) {
                const spacer = document.createElement('div');
                spacer.className = 'spacer';
                rowEl.appendChild(spacer);
            }
        });
    });
    updateKbdUI();
}

function updateKbdUI() {
    const allKeys = [...row1, ...row2, ...row3, "p"];
    allKeys.forEach(k => {
        const el = document.getElementById(`key-${k}`);
        if (!el) return;
        el.classList.remove('plus-active', 'multi', 'vowel-plus', 'special-plus', 'subtle', 'base-key', 'step-key', 'func');
        
        let label = k.toUpperCase();
        if (stepMapRow[k]) { label = stepMapRow[k][0]; el.classList.add('base-key'); }
        else if (nasalKeys[k]) { label = nasalKeys[k]; }
        else if (k === 'p') { label = "+"; }

        if (state.isPlusMode) {
            if (['o', ';'].includes(k)) { label = ""; }
            else if (plusVowels[k]) { label = plusVowels[k]; el.classList.add('vowel-plus'); }
            else if (plusSpecials[k]) { label = plusSpecials[k]; el.classList.add('special-plus'); }
            else if (k === 'p') { el.classList.add('plus-active'); }
        } else {
            if (['u','o'].includes(k)) el.classList.add('step-key');
            if (['t','y','g','h','b','n'].includes(k)) el.classList.add('subtle');
            if (k === 'u') {
                const group = state.activeBase ? stepMapRow[state.activeBase] : null;
                const isLongRow = group && group.length >= 5;
                const nextU = group ? (state.uIndex + 1 < group.length ? state.uIndex + 1 : 1) : 1;
                if (group && group[nextU]) {
                    if (isLongRow && group[nextU + 1]) {
                        label = group[nextU] + " " + group[nextU + 1];
                    } else {
                        label = group[nextU];
                    }
                } else {
                    label = "➞";
                }
                el.classList.add('func');
            } else if (k === 'o') {
                const group = state.activeBase ? stepMapRow[state.activeBase] : null;
                const isLongRow = group && group.length >= 5;
                const jumpTo = isLongRow ? 3 : 2;
                const nextO = group ? (state.oIndex < jumpTo ? jumpTo : (state.oIndex + 1 < group.length ? state.oIndex + 1 : jumpTo)) : jumpTo;
                if (group && group[nextO]) {
                    label = group[nextO] + (group[nextO + 1] ? " " + group[nextO + 1] : "");
                } else {
                    label = "➞➞";
                }
                el.classList.add('func');
            } else if (multiTapMap[k]) {
                label = multiTapMap[k].join(" "); el.classList.add('multi');
            }
        }
        el.innerText = label;
    });
}

const ZWNJ = "\u200C", VIRAMA = "\u1039";
const MYANMAR_DIACRITICS = new Set([
    0x1038, 0x1037, 0x1036,
    0x102C, 0x102B,
    0x102D, 0x102E, 0x1032,
    0x102F, 0x1030,
    0x103A,
    0x103C, 0x103B,
    0x103E, 0x103D,
]);


    const BEFORE_E_SET = new Set([0x103C,0x103B,0x103E,0x103D,0x103A]);
    function analyzePendingStep(text) {
        const eIdx = text.lastIndexOf("ေ");
        if (eIdx === -1) return null;
        const afterE = text.slice(eIdx + 1);
        const beforePart = text.slice(0, eIdx);
        let beEnd = beforePart.length;
        while (beEnd > 0 && BEFORE_E_SET.has(beforePart.codePointAt(beEnd - 1))) beEnd--;
        return { consonant: beforePart.slice(0, beEnd), beforeE: beforePart.slice(beEnd), afterE };
    }

function handleInput(key) {
    const k = key.toLowerCase();
    let t = getText();

    // ── 백스페이스 ──────────────────────────────────────────
    if (k === "backspace") {
        if (state.pendingStepE) {
            setText(t.slice(0, -2));
            state.pendingStepE = false;
            state.pendingStep = true;
        } else if (state.pendingStep) {
            const ps = analyzePendingStep(t);
            if (ps && ps.afterE.length > 0) {
                setText(t.slice(0, -1));
            } else if (ps && ps.beforeE.length > 0) {
                setText(ps.consonant + "ေ");
            } else {
                const eIdx = t.lastIndexOf("ေ");
                setText(t.slice(0, eIdx - 1) + "ေ");
                state.pendingStep = false;
                state.pendingE = true;
            }
        } else if (state.pendingE) {
            setText(t.endsWith(ZWNJ + "ေ") ? t.slice(0, -2) : t.slice(0, -1));
            state.pendingE = false;
        } else {
            setText(t.slice(0, -1));
        }
        state.lastTapKey = null; state.tapIndex = 0;
        resetStep(); updateKbdUI(); editor.scrollTop = editor.scrollHeight; afterInput(); return;
    }

    // ── p: plus 모드 토글 ────────────────────────────────────
    if (k === 'p') {
        // pendingStepE 중이면 임시 ေ 정리
        if (state.pendingStepE) { setText(t.slice(0, -2)); state.pendingStepE = false; }
        resetStep();
        state.isPlusMode = !state.isPlusMode; updateKbdUI(); afterInput(); return;
    }

    // ── plus 모드 ────────────────────────────────────────────
    if (state.isPlusMode) {
    if (['o', ';'].includes(k)) { return; }
    if (plusSpecials[k]) {
        setText(getText() + plusSpecials[k]);
    } else if (stepMapRow[k]) {
        if (state.pendingStep) {
            let cur = getText();
            setText(cur.slice(0, -1) + VIRAMA + stepMapRow[k][0] + "ေ");
        } else {
            setText(getText() + VIRAMA + stepMapRow[k][0]);
        }
        state.activeBase = k; state.currentIndex = 0;
    } else if (nasalKeys[k]) {
        if (state.pendingStep) {
            let cur = getText();
            setText(cur.slice(0, -1) + VIRAMA + nasalKeys[k] + "ေ");
        } else {
            setText(getText() + VIRAMA + nasalKeys[k]);
        }
    } else if (plusVowels[k]) {
        setText(getText() + plusVowels[k]);
    }
    state.isPlusMode = false; updateKbdUI(); editor.scrollTop = editor.scrollHeight; afterInput(); return;
}

    // ── pendingStepE 상태에서 j 외 다른 키 → 임시 ေ 확정(새 글자 시작) ─
    if (state.pendingStepE && k !== "j") {
        // 임시 ZWNJ+ေ를 실제 새 pendingE로 전환하고 현재 키 처리
        state.pendingStepE = false;
        state.pendingStep = false;
        state.pendingE = true;
        // 텍스트는 이미 ...자음+ေ+ZWNJ+ေ 상태 → 뒤 ZWNJ+ေ가 새 pendingE
        // 이후 아래 로직에서 pendingE=true 상태로 자음키 등 처리됨
        t = getText(); // 갱신
    }

    // ── 자음 키 ──────────────────────────────────────────────
    if (stepMapRow[k] || nasalKeys[key]) {
        let char = stepMapRow[k] ? stepMapRow[k][0] : nasalKeys[key];

        if (state.pendingE) {
            // ေ 선입력 대기 → 자음 결합: (앞내용) + 자음 + ေ
            let base = t.endsWith(ZWNJ + "ေ") ? t.slice(0, -2) : t.slice(0, -1);
            setText(base + char + "ေ");
            state.pendingE = false;
            state.pendingStep = true;
            state.lastTapKey = null; state.tapIndex = 0;
        } else {
            setText(t + char);
            state.pendingStep = false;
            state.pendingE = false;
            state.lastTapKey = null; state.tapIndex = 0;
        }

        if (stepMapRow[k]) { state.activeBase = k; state.currentIndex = 0; state.uIndex = 0; state.oIndex = 0; }
        else resetStep();

    // ── u(near)/o(away): 스텝맵 이동 ────────────────────────
    } else if ((k === 'u' || k === 'o') && state.activeBase) {
        const group = stepMapRow[state.activeBase];
        const isLongRow = group && group.length >= 5;
        let targetIdx;
        if (k === 'u') {
            state.oIndex = 0;
            state.uIndex += 1;
            if (state.uIndex >= group.length) state.uIndex = 1;
            targetIdx = state.uIndex;
        } else {
            state.uIndex = 0;
            const jumpTo = isLongRow ? 3 : 2;
            if (state.oIndex < jumpTo) state.oIndex = jumpTo;
            else state.oIndex += 1;
            if (state.oIndex >= group.length) state.oIndex = jumpTo;
            targetIdx = state.oIndex;
        }
        if (group && group[targetIdx]) {
            let cur = getText();
            if (state.pendingStep) {
                setText(cur.slice(0, -2) + group[targetIdx] + "ေ");
            } else {
                setText(cur.slice(0, -1) + group[targetIdx]);
            }
            state.currentIndex = targetIdx;
            state.lastTapKey = null; state.tapIndex = 0;
        }

    // ── 멀티탭 키 ────────────────────────────────────────────
    } else if (multiTapMap[k]) {
        // 미얀마 유니코드 음절 순서:
        //   자음 + ြ/ျ(.) + ှ/ွ(m) + ေ(j) + ာ/ါ(l) + ိ/ီ/ဲ(i) + ု/ူ(,) + ်/ံ(k) + း/့(;)
        // beforeE_keys: ေ 앞에서 재조립 (자음+부호+ေ)
        // 그 외(l,i,,,k,;): ေ 뒤에 추가 (자음+ေ+부호)
        const beforeE_keys = [".", "m", "k"];

        if (state.lastTapKey === k && state.tapIndex < multiTapMap[k].length - 1) {
            // 연속 탭 → 다음 값으로 교체
            state.tapIndex++;
            let val = multiTapMap[k][state.tapIndex];
            if (state.pendingStep) {
                let cur = getText();
                if (beforeE_keys.includes(k)) {
                    // ေ 앞 이전 부호 교체
                    const eIdx = cur.lastIndexOf("ေ");
                    const afterE = cur.slice(eIdx + 1);
                    setText(cur.slice(0, eIdx - 1) + val + "ေ" + afterE);
                } else {
                    // ေ 뒤 이전 부호 교체
                    setText(cur.slice(0, -1) + val);
                }
            } else {
                setText(getText().slice(0, -1) + val);
            }
            if (k !== "j") { resetStep(); }
            // pendingStep은 유지 (ေ 결합 상태 계속)
        } else {
            // 첫 탭 또는 다른 키에서 전환
            state.lastTapKey = k; state.tapIndex = 0;
            let val = multiTapMap[k][0];

            if (k === "j") {
                // j → pendingE 진입
                setText(getText() + ZWNJ + val);
                state.pendingE = true;
                state.pendingStep = false;
                resetStep();
            } else if (state.pendingStep) {
                let cur = getText();
                if (beforeE_keys.includes(k)) {
                    // ေ 앞에 붙는 부호: ေ 위치 찾아서 앞에 삽입
                    const eIdx = cur.lastIndexOf("ေ");
                    const afterE = cur.slice(eIdx + 1);
                    setText(cur.slice(0, eIdx) + val + "ေ" + afterE);
                } else {
                    // ေ 뒤에 붙는 부호: 그냥 추가
                    setText(cur + val);
                }
                resetStep();
            } else if (state.pendingE) {
                // ေ 선입력 대기 중 (j 입력 후 자음 전) → 부호를 자음 앞에, ေ는 뒤로
                // 해당 키: m(ှ/ွ), ,(ု/ူ), .(ြ/ျ)
                let cur = getText();
                let base = cur.endsWith(ZWNJ + "ေ") ? cur.slice(0, -2) : cur.slice(0, -1);
                setText(base + val + "ေ");
                state.pendingE = false;
                state.pendingStep = true;
            } else {
                setText(getText() + val);
                resetStep(); // 모음 결합 시 무브키 항상 리셋
                state.pendingStep = false;
            }
        }

    // ── 기타 키 ─────────────────────────────────────────────
    } else {
    if (k === 'u' || k === 'o') return; // activeBase 없으면 무시
    if (k === 'enter') { setText(t + '\n'); resetState(); updateKbdUI(); afterInput(); return; }
    setText(t + key);
    resetState();
}

    editor.scrollTop = editor.scrollHeight;
    updateKbdUI();
    afterInput();
}


const ignoredKeys = new Set(['shift','control','alt','meta','capslock','tab','escape','arrowleft','arrowright','arrowup','arrowdown','f1','f2','f3','f4','f6','f7','f8','f9','f10','f11']);

window.addEventListener('keydown', (e) => {
    let k = e.key.toLowerCase();
    if (ignoredKeys.has(k)) return;
    const el = document.getElementById(`key-${k}`);
    if (el) el.classList.add('active');
    handleInput(k);
    if (k !== 'f5' && k !== 'f12') e.preventDefault();
});
window.addEventListener('keyup', (e) => {
    const el = document.getElementById(`key-${e.key.toLowerCase()}`);
    if (el) el.classList.remove('active');
});

function resetStep() { state.activeBase = null; state.currentIndex = 0; state.uIndex = 0; state.oIndex = 0; }
function resetState() { resetStep(); state.lastTapKey = null; state.tapIndex = 0; state.isPlusMode = false; }

// ── 미니 내비 ──────────────────────────────────────────────
const stepNav = document.getElementById('step-nav');

function getCaretRect() {
    const marker = document.createElement('span');
    marker.textContent = '\u200B';
    editor.appendChild(marker);
    const rect = marker.getBoundingClientRect();
    editor.removeChild(marker);
    return rect;
}

function showStepNav() {
    if (!state.activeBase || !stepMapRow[state.activeBase]) { hideStepNav(); return; }
    const group = stepMapRow[state.activeBase];
    const idx = state.currentIndex;

    stepNav.innerHTML = '';
    const isLongRow = group.length >= 5;
    const awayStart = isLongRow ? 3 : 2;

    const nearGroup = document.createElement('div');
    nearGroup.className = 'snav-group';
    group.slice(0, awayStart).forEach((ch, i) => {
        const cell = document.createElement('div');
        cell.className = 'snav-cell' + (i === idx ? ' active' : '');
        cell.textContent = ch;
        nearGroup.appendChild(cell);
    });
    stepNav.appendChild(nearGroup);

    if (group.length > awayStart) {
        const awayGroup = document.createElement('div');
        awayGroup.className = 'snav-group';
        group.slice(awayStart).forEach((ch, i) => {
            const absIdx = i + awayStart;
            const cell = document.createElement('div');
            cell.className = 'snav-cell' + (absIdx === idx ? ' active' : '');
            cell.textContent = ch;
            awayGroup.appendChild(cell);
        });
        stepNav.appendChild(awayGroup);
    }

    const rect = getCaretRect();
    const navW = group.length * 37 + (group.length > awayStart ? 8 : 0);
    const navH = 37;
    let left = rect.left;
    let top  = rect.bottom + 6;
    if (left + navW > window.innerWidth  - 8) left = window.innerWidth  - navW - 8;
    if (top  + navH > window.innerHeight - 4) top  = rect.top - navH - 6;
    if (left < 4) left = 4;

    stepNav.style.left = left + 'px';
    stepNav.style.top  = top  + 'px';
    stepNav.classList.add('visible');
}

function hideStepNav() { stepNav.classList.remove('visible'); }

function afterInput() {
    requestAnimationFrame(() => {
        if (state.activeBase && !state.isPlusMode) showStepNav();
        else hideStepNav();
    });
}

function resetEditor() {
    setText('');
    resetState();
    updateKbdUI();
}

function goToBoard() {
    const content = getText().trim();
    if (!content) {
        alert('မည်သည့်စာမျှ မရေးရသေးပါ။ အတကယဖြင့် တစ်ခုခု ရေးကြည့်ပါ!');
        return;
    }
    const encoded = encodeURIComponent(content);
    location.href = `board.html?from=pc&content=${encoded}`;
}

initKbd();
</script>
